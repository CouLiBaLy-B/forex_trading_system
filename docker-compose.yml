services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - APP_ENV=dev
      - LOG_LEVEL=DEBUG

  dashboard:
    build: .
    command: streamlit run src/dashboard/app.py --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
